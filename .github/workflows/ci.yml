name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Avoid upcoming GitHub Actions JS runtime breakage:
  # actions/checkout and actions/setup-node currently run on Node 20 internally.
  # GitHub will default to Node 24 soon; opt-in now to catch issues early.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-test-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Dependency audit (high+)
        run: npm audit --audit-level=high

  docker-build:
    needs: build-test-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t memory-service:ci .

