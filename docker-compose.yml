# Memory Service — Hermes Agent 向量记忆中间件
# 与 Hermes 容器部署在同一台 ECS，通过 Docker 网络互通

services:
  memory-service:
    build: .
    container_name: memory-service
    restart: unless-stopped
    ports:
      - "3010:3010"
    volumes:
      - memory-data:/app/data
    env_file:
      - .env
    networks:
      - hermes-net
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3010/api/memory/health',{headers:{'x-memory-api-key':process.env.MEMORY_SERVICE_API_KEY||''}}).then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  memory-data:

networks:
  hermes-net:
    external: true
    name: hermes-net
